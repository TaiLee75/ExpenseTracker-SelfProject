<div class="login-container">
  <div class="glass-card login-card">
    <div class="brand">
      <div class="logo-icon"></div>
      <h2>ExpenseTracker</h2>
    </div>
    
    <p class="subtitle">Welcome back! Please login to your account.</p>

    <div *ngIf="errorMessage" class="error-message" style="color: var(--accent-danger); background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.3);">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          id="username" 
          type="text" 
          class="glass-input" 
          formControlName="username" 
          placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          class="glass-input" 
          formControlName="password" 
          placeholder="Enter your password">
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" class="forgot-password">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary w-100" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>

    <div class="register-prompt">
      Don't have an account? <a href="#">Create one</a>
    </div>
  </div>
</div>
