<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar glass-card">
    <div class="brand">
      <div class="logo-icon"></div>
      <h2>ExpenseTracker</h2>
    </div>
    <nav class="nav-menu">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">🏠 Dashboard</a>
      <a routerLink="/transactions" routerLinkActive="active" class="nav-item">💳 Giao dịch</a>
      <a routerLink="/categories" routerLinkActive="active" class="nav-item">🏷️ Danh mục</a>
    </nav>

    <!-- Sidebar Bottom: Balance -->
    <div class="sidebar-footer">
      <div class="balance-display">
        <div class="balance-header-row">
          <p class="balance-label">💰 Số dư hiện tại</p>
          <div class="balance-actions">
            <button class="balance-action-btn" (click)="toggleBalanceVisibility()" [title]="balanceVisible ? 'Ẩn số dư' : 'Hiện số dư'">
              {{ balanceVisible ? '👁️' : '🙈' }}
            </button>
            <button class="balance-action-btn" (click)="openBalanceModal()" title="Sửa số dư">✏️</button>
          </div>
        </div>
        <p class="balance-amount" *ngIf="currentBalance !== null && balanceVisible">
          {{ formatCurrency(currentBalance) }}
        </p>
        <p class="balance-hidden" *ngIf="currentBalance !== null && !balanceVisible">••••••••</p>
        <p class="balance-loading" *ngIf="currentBalance === null">Đang tải...</p>
      </div>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="main-content">
    <!-- Topbar -->
    <header class="topbar glass-card">
      <div class="page-title">ExpenseTracker</div>
      <div class="user-profile-area">
        <div class="user-info">
          <div class="avatar"></div>
          <span class="username">{{ username }}</span>
        </div>
        <button class="btn-logout" id="btn-logout" (click)="logout()" title="Đăng xuất">
          🚪 Đăng xuất
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- Edit Balance Modal -->
<div class="modal-backdrop" *ngIf="showBalanceModal" (click)="closeBalanceModal()">
  <div class="modal glass-card modal-sm" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>💰 Cập nhật số dư</h3>
      <button class="btn-icon-close" (click)="closeBalanceModal()">✕</button>
    </div>
    <div class="modal-body-balance">
      <p class="balance-modal-hint">Nhập số dư thực tế hiện tại của bạn:</p>
      <input
        class="glass-input"
        type="number"
        id="balance-input"
        [(ngModel)]="newBalanceInput"
        min="0"
        placeholder="0">
      <p class="balance-error" *ngIf="balanceError">{{ balanceError }}</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="closeBalanceModal()">Huỷ</button>
      <button class="btn-primary" id="btn-save-balance" (click)="saveBalance()" [disabled]="isSavingBalance">
        {{ isSavingBalance ? 'Đang lưu...' : 'Cập nhật' }}
      </button>
    </div>
  </div>
</div>
