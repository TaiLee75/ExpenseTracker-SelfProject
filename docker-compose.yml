services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: expense-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backups
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Expense@123", "-C", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

    backend:
      image: expense-api:1.0
      container_name: expense-api
      depends_on:
        sqlserver:
          condition: service_healthy
      ports:
        - "5000:8080"
      environment:
        ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
        Jwt__Key: ${JWT_KEY}
        Jwt__Issuer: "ExpenseTrackerAPI"
        Jwt__Audience: "ExpenseTrackerClient"
      restart: unless-stopped

    frontend:
      image: expense-frontend:1.0
      container_name: expense-frontend
      depends_on:
        - backend
      ports:
        - "4200:80"
      restart: unless-stopped

volumes:
  sql_data:
